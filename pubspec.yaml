name: conciertos_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.1.0
  http: ^1.5.0
  image_picker: ^1.1.2
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  google_fonts: ^8.1.0
  intl: ^0.20.3
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/imports/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true